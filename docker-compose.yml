version: '3.9'

services:

  nginx-edge:
    image: nginx:latest
    container_name: nginx-edge
    ports:
      - "8080:80"
    volumes:
      - ./nginx-edge/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nginx-internal-1

  nginx-internal-1:
    image: nginx:latest
    container_name: nginx-internal-1
    volumes:
      - ./nginx-internal-1/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nginx-internal-2

  nginx-internal-2:
    image: nginx:latest
    container_name: nginx-internal-2
    volumes:
      - ./nginx-internal-2/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  app:
    build: ./app
    container_name: xff-demo-app
